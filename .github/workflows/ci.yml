name: CI — Build, Push, Update Manifests

on:
  push:
    branches: [main]           # only runs on pushes to main branch
    paths:                     # only runs if these paths changed
      - 'services/**'          # any service code change
      - 'k8s/**'               # any k8s manifest change
  workflow_dispatch:           # allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  # ── Job 1: Build and push all 4 images in parallel ─────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - product-service
          - notification-service
      fail-fast: false         # if one service fails, others keep building

    permissions:
      contents: read
      packages: write          # needed to push to ghcr.io

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables advanced features: multi-platform builds, cache export

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cloudpilot-${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                    # use GitHub Actions cache
          cache-to: type=gha,mode=max             # save layers to cache
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Output image digest
        run: echo "Pushed ${{ matrix.service }} — ${{ steps.meta.outputs.tags }}"


  # ── Job 2: Update k8s manifests with new image tags ────────────────────
  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: build-and-push      # only runs AFTER all 4 images are built
    
    permissions:
      contents: write          # needed to commit back to repo

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update image tags in prod overlay
        run: |
          # Update each image tag in kustomization.yaml
          cd k8s/overlays/prod

          # Use kustomize to set image tags (cleaner than sed)
          # Install kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          # Update all 4 image tags to the new SHA
          kustomize edit set image \
            ghcr.io/moazzamhafeez1093/cloudpilot-api-gateway=ghcr.io/moazzamhafeez1093/cloudpilot-api-gateway:${{ steps.sha.outputs.short }} \
            ghcr.io/moazzamhafeez1093/cloudpilot-user-service=ghcr.io/moazzamhafeez1093/cloudpilot-user-service:${{ steps.sha.outputs.short }} \
            ghcr.io/moazzamhafeez1093/cloudpilot-product-service=ghcr.io/moazzamhafeez1093/cloudpilot-product-service:${{ steps.sha.outputs.short }} \
            ghcr.io/moazzamhafeez1093/cloudpilot-notification-service=ghcr.io/moazzamhafeez1093/cloudpilot-notification-service:${{ steps.sha.outputs.short }}

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.sha.outputs.short }} [skip ci]"
          git push
        # [skip ci] prevents this commit from triggering another pipeline run