---
- name: Create argocd namespace
  command: microk8s kubectl create namespace argocd --dry-run=client -o yaml | microk8s kubectl apply -f -
  changed_when: false

- name: Install ArgoCD
  command: >
    microk8s kubectl apply -n argocd -f
    https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  changed_when: false

- name: Wait for ArgoCD pods to be ready
  command: >
    microk8s kubectl wait --for=condition=available
    deployment/argocd-server -n argocd --timeout=300s
  changed_when: false

- name: Patch ArgoCD server service to NodePort
  command: >
    microk8s kubectl patch svc argocd-server -n argocd
    -p '{"spec":{"type":"NodePort","ports":[{"port":80,"targetPort":8080,"nodePort":8080,"protocol":"TCP","name":"http"}]}}'
  changed_when: false

- name: Apply ArgoCD AppProject
  copy:
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: AppProject
      metadata:
        name: cloudpilot
        namespace: argocd
      spec:
        description: CloudPilot project
        sourceRepos:
          - https://github.com/MoazzamHafeez1093/Cloudpilot-AWS-Multi-Tier-k8s-terraform-argocd.git
        destinations:
          - server: https://kubernetes.default.svc
            namespace: default
          - server: https://kubernetes.default.svc
            namespace: argocd
        clusterResourceWhitelist:
          - group: ''
            kind: Namespace
        namespaceResourceWhitelist:
          - group: '*'
            kind: '*'
    dest: /tmp/argocd-project.yaml

- name: Apply AppProject to cluster
  command: microk8s kubectl apply -f /tmp/argocd-project.yaml
  changed_when: false

- name: Apply ArgoCD Application
  copy:
    content: |
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: cloudpilot
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        project: cloudpilot
        source:
          repoURL: https://github.com/MoazzamHafeez1093/Cloudpilot-AWS-Multi-Tier-k8s-terraform-argocd.git
          targetRevision: HEAD
          path: k8s/overlays/prod
        destination:
          server: https://kubernetes.default.svc
          namespace: default
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
    dest: /tmp/argocd-app.yaml

- name: Apply Application to cluster
  command: microk8s kubectl apply -f /tmp/argocd-app.yaml
  changed_when: false

- name: Get ArgoCD initial admin password
  command: >
    microk8s kubectl -n argocd get secret argocd-initial-admin-secret
    -o jsonpath="{.data.password}"
  register: argocd_password_b64
  changed_when: false

- name: Decode ArgoCD password
  command: echo {{ argocd_password_b64.stdout }} | base64 -d
  register: argocd_password
  changed_when: false

- name: Print ArgoCD access info
  debug:
    msg:
      - "ArgoCD URL:      http://13.51.149.67:8080"
      - "ArgoCD Username: admin"
      - "ArgoCD Password: {{ argocd_password.stdout }}"