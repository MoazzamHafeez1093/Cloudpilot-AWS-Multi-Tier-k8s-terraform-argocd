apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    project: cloudpilot
spec:
  type: NodePort           # accessible from outside the cluster
  selector:
    app: api-gateway       # routes traffic to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 3000           # port on the Service
      targetPort: 3000     # port on the Pod
      nodePort: 30000      # port on the EC2 instance — access via EC2_IP:30000