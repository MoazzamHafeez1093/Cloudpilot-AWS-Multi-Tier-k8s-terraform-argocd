apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
    project: cloudpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        project: cloudpilot
    spec:
      containers:
        - name: user-service
          image: ghcr.io/moazzamhafeez1093/cloudpilot-user-service:latest
          ports:
            - containerPort: 4001
          envFrom:
            - configMapRef:
                name: user-service-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: user-data
              mountPath: /data     # mount the PVC at /data inside the container
      volumes:
        - name: user-data
          persistentVolumeClaim:
            claimName: user-service-pvc
      restartPolicy: Always