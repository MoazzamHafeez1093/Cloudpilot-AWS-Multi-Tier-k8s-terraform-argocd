apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  labels:
    app: product-service
    project: cloudpilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-service
        project: cloudpilot
    spec:
      containers:
        - name: product-service
          image: ghcr.io/moazzamhafeez1093/cloudpilot-product-service:latest
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: product-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: product-data
              mountPath: /data
      volumes:
        - name: product-data
          persistentVolumeClaim:
            claimName: product-service-pvc
      restartPolicy: Always