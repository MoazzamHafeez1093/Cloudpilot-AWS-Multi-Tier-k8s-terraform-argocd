apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: cloudpilot-prod

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production

images:
  - name: ghcr.io/moazzamhafeez1093/cloudpilot-api-gateway
    newTag: latest
  - name: ghcr.io/moazzamhafeez1093/cloudpilot-user-service
    newTag: latest
  - name: ghcr.io/moazzamhafeez1093/cloudpilot-product-service
    newTag: latest
  - name: ghcr.io/moazzamhafeez1093/cloudpilot-notification-service
    newTag: latest

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
      spec:
        replicas: 2
    target:
      kind: Deployment
      name: api-gateway